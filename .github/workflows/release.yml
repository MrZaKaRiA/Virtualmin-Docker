name: Build and release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Validate Perl syntax
        run: |
          # docker-lib.pl does `use WebminCore`, which is not present on the
          # runner. Provide a tiny stub so `perl -c` can validate syntax.
          stub="$(mktemp -d)"
          printf 'package WebminCore;\nsub import { }\n1;\n' > "$stub/WebminCore.pm"
          fail=0
          for f in docker/*.cgi docker/*.pl; do
            echo "Checking $f"
            PERL5LIB="$stub" perl -c "$f" || fail=1
          done
          exit $fail

      - name: Build .wbm.gz package
        run: |
          # The package's top-level directory must equal the module name.
          tar --exclude='.DS_Store' --exclude='*.swp' \
              -czf docker.wbm.gz docker
          ls -l docker.wbm.gz

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker.wbm.gz
          path: docker.wbm.gz

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: ${{ github.event.inputs.version || github.ref_name }}
          files: docker.wbm.gz
          generate_release_notes: true
